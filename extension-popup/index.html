<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Popup</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Header: Identitas & Pengantar -->
  <header class="header">
    <h1 class="header-title">My Extension</h1>
    <p class="header-subtitle">Simplify your workflow seamlessly.</p>
  </header>

  <!-- Main Content: Area informasi utama -->
  <main class="content">
    <section class="card">
      <h2 class="card-title">System Status</h2>
      <p class="card-text">Everything is running smoothly. Your settings are synced and active.</p>
    </section>

    <ul class="feature-list">
      <li class="feature-item">
        <span class="feature-indicator"></span>
        <span class="feature-text">Ad blocking enabled</span>
      </li>
      <li class="feature-item">
        <span class="feature-indicator"></span>
        <span class="feature-text">Privacy mode active</span>
      </li>
    </ul>
  </main>

  <!-- Footer: Aksi Pengguna -->
  <footer class="footer">
    <button class="btn btn-primary">Open Settings</button>
  </footer>
</body>

</html>
