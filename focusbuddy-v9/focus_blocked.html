<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Focus Mode Aktif — FocusBuddy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #e8e8e8;
    text-align: center;
    padding: 24px;
  }
  .container {
    max-width: 420px;
    animation: fadeIn 0.5s ease-out;
  }
  .lock-icon {
    font-size: 72px;
    margin-bottom: 24px;
    animation: pulse 2s infinite ease-in-out;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 12px;
    color: #fff;
  }
  .subtitle {
    font-size: 16px;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .quote {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    font-style: italic;
    color: #cbd5e1;
    line-height: 1.5;
    font-size: 15px;
  }
  .quote::before { content: '"'; font-size: 24px; color: #f59e0b; }
  .quote::after { content: '"'; font-size: 24px; color: #f59e0b; }
  .timer {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    color: #f59e0b;
    margin-bottom: 16px;
  }
  .back-btn {
    padding: 14px 32px;
    border-radius: 99px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #94a3b8;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.05);
    color: #e2e8f0;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="lock-icon">🔒</div>
    <h1>Focus Mode Aktif</h1>
    <p class="subtitle">
      Situs ini sementara diblokir selama sesi fokus kamu. <br>
      Kembali ke Flowbee dan selesaikan task-mu dulu! 💪
    </p>
    <div class="quote">
      Semakin kamu kabur, pekerjaan hanya akan menumpuk. 
      Tapi semakin kamu melangkah, semakin ringan terasa.
    </div>
    <div class="timer">
      ⏱️ Focus session sedang berjalan...
    </div>
    <br><br>
    <button class="back-btn" onclick="history.back()">← Kembali</button>
  </div>
</body>
</html>
