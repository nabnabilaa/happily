<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusBuddy Extension</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo">FocusBuddy</h1>
            <button class="icon-button" aria-label="Settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Attendance / Clock-in Section -->
            <div class="attendance-section">
                <div class="schedule-card">
                    <div class="schedule-col">
                        <span class="schedule-label">JAM KERJA</span>
                        <span class="schedule-time">08:00 - 17:00</span>
                    </div>
                    <div class="schedule-col">
                        <span class="schedule-label">ISTIRAHAT</span>
                        <span class="schedule-time">12:00 - 13:00</span>
                    </div>
                </div>
                <button class="clock-in-btn">
                    ⚠️ Belum Clock-in — Klik untuk absen
                </button>
            </div>

            <div class="status-section">
                <h2 class="status-title">Ready to Focus</h2>
                <p class="status-desc">Minimize distractions and boost productivity.</p>
            </div>
            
            <div class="timer-card">
                <div class="timer-display">
                    <span id="timer-min">00</span>
                    <span class="timer-colon">:</span>
                    <span id="timer-sec">00</span>
                    <span class="timer-dot">.</span>
                    <span id="timer-ms">00</span>
                </div>
                
                <div class="timer-actions">
                    <button id="btn-reset" class="btn-timer btn-reset">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.25 5.25"/></svg>
                        Reset
                    </button>
                    <button id="btn-start-stop" class="btn-timer btn-start">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="icon-play"><path d="M5 3l14 9-14 9V3z"/></svg>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="icon-stop" style="display:none;"><path d="M6 6h12v12H6z"/></svg>
                        <span id="start-stop-text">Start</span>
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer / Controls -->
        <footer class="footer">
            <button class="primary-button">Start Session</button>
        </footer>
    </div>
    
    <!-- Link to JavaScript Logic -->
    <script src="script.js"></script>
</body>
</html>
